    <path id="p5" d="M 700,310 m -410,0 a 410,136 0 1 1 820,0 a 410,136 0 1 1 -820,0"/>

    <!-- Reverse paths for counter-clockwise orbits -->
    <path id="p2r" d="M 700,310 m 155,0 a 155,52 0 1 0 -310,0 a 155,52 0 1 0 310,0"/>
    <path id="p4r" d="M 700,310 m 315,0 a 315,104 0 1 0 -630,0 a 315,104 0 1 0 630,0"/>
